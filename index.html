<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      background: transparent !important;
      overflow: hidden;
      width: 120px;
      height: 120px;
      user-select: none;
      -webkit-user-select: none;
    }
    canvas {
      display: block;
      cursor: grab;
    }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
  <canvas id="cat" width="120" height="120"></canvas>
  <script src="renderer.js"></script>
</body>
</html>
